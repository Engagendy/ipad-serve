  <rect x="850" y="60" width="210" height="38" rx="19" fill="#087987"/>
  <text x="955" y="85" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" text-anchor="middle" font-weight="700">Server running</text>

