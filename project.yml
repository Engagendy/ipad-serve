name: iPadServe
options:
  bundleIdPrefix: com.engagendy
  deploymentTarget:
    iOS: "17.0"
settings:
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 1
  DEVELOPMENT_TEAM: 7JM77223V5
targets:
  iPadServe:
    type: application
    platform: iOS
    sources:
      - path: iPadServe
    resources:
      - path: iPadServe/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.engagendy.iPadServe
        PRODUCT_NAME: iPad Serve
        INFOPLIST_FILE: iPadServe/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7JM77223V5
        SUPPORTS_MACCATALYST: false
    info:
      path: iPadServe/Resources/Info.plist
      properties:
        CFBundleDisplayName: iPad Serve
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsArbitraryLoadsInWebContent: true
          NSAllowsLocalNetworking: true
  iPadServeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: iPadServeUITests
    dependencies:
      - target: iPadServe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.engagendy.iPadServeUITests
        PRODUCT_NAME: iPad Serve UI Tests
        TEST_TARGET_NAME: iPadServe
        DEVELOPMENT_TEAM: 7JM77223V5
        GENERATE_INFOPLIST_FILE: true
