<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">File browser screenshot</title>
  <desc id="desc">File tree showing HTML pages, folders, CSS, JavaScript, and MOV media.</desc>
  <rect width="1200" height="820" fill="#0d2635"/>
  <rect x="42" y="42" width="1116" height="736" rx="34" fill="#ffffff"/>
  <rect x="42" y="42" width="1116" height="70" rx="34" fill="#071722"/>
  <text x="604" y="83" fill="#dbe9ec" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" text-anchor="middle" font-weight="700">GPRC / index.html</text>
  <rect x="78" y="137" width="1044" height="52" rx="18" fill="#102b3a"/>
  <circle cx="116" cy="163" r="13" fill="#ffffff" opacity=".26"/>
  <circle cx="158" cy="163" r="13" fill="#ffffff" opacity=".26"/>
  <circle cx="200" cy="163" r="13" fill="#ffffff" opacity=".26"/>
  <rect x="940" y="145" width="152" height="36" rx="18" fill="#087987"/>
  <text x="1016" y="169" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" text-anchor="middle" font-weight="700">Fullscreen</text>

  <rect x="78" y="218" width="330" height="500" rx="24" fill="#f7f9f8" stroke="#d8e0e4"/>
  <text x="116" y="270" fill="#12202a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="800">Files</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">
    <rect x="110" y="304" width="266" height="52" rx="12" fill="#e6f2f3"/>
    <text x="144" y="337" fill="#087987" font-weight="800">index.html</text>
    <rect x="110" y="372" width="266" height="52" rx="12" fill="#ffffff"/>
    <text x="144" y="405" fill="#12202a" font-weight="700">pages</text>
    <rect x="130" y="440" width="246" height="48" rx="12" fill="#ffffff"/>
    <text x="164" y="471" fill="#12202a">about.html</text>
    <rect x="110" y="504" width="266" height="52" rx="12" fill="#ffffff"/>
    <text x="144" y="537" fill="#12202a" font-weight="700">assets</text>
    <rect x="130" y="572" width="246" height="48" rx="12" fill="#ffffff"/>
    <text x="164" y="603" fill="#12202a">site.css</text>
    <rect x="130" y="632" width="246" height="48" rx="12" fill="#ffffff"/>
    <text x="164" y="663" fill="#12202a">app.js</text>
  </g>

  <rect x="448" y="218" width="674" height="500" rx="24" fill="#102b3a"/>
  <text x="496" y="286" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="800">index.html</text>
  <text x="496" y="328" fill="#a8c4cc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21">The selected page opens through localhost.</text>
  <rect x="496" y="382" width="240" height="96" rx="18" fill="#ffffff" opacity=".1"/>
  <text x="528" y="421" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700">CSS</text>
  <text x="528" y="454" fill="#a8c4cc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">styles load</text>
  <rect x="768" y="382" width="240" height="96" rx="18" fill="#ffffff" opacity=".1"/>
  <text x="800" y="421" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700">JS</text>
  <text x="800" y="454" fill="#a8c4cc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">modals work</text>
  <rect x="496" y="514" width="512" height="96" rx="18" fill="#ffffff" opacity=".1"/>
  <text x="528" y="554" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700">video/intro.mov</text>
  <text x="528" y="586" fill="#a8c4cc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">range requests support playback and seeking</text>
</svg>
