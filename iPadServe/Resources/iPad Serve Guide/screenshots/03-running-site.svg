<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Running site screenshot</title>
  <desc id="desc">A website running inside iPad Serve with browser controls and a local server address.</desc>
