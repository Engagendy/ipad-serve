  <text x="128" y="430" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="74" font-weight="900">All served locally.</text>
  <text x="132" y="486" fill="#dbe9ec" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24">Buttons, modals, charts, links, and videos can run from the copied folder.</text>
